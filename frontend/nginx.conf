# =============================================================================
# nginx sidecar for the Upscaling frontend.
#
# Serves /index.html and proxies API calls to the Forge container running on
# localhost:7860 in the same pod. Also serves a JSON directory listing of the
# LoRA folder so the frontend can populate its LoRA picker without needing
# Forge to expose that as a first-class API.
# =============================================================================

worker_processes 1;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # Generations are big base64 blobs; raise defaults accordingly.
    client_max_body_size 200M;

    # Proxy timeouts: an Ultimate Upscale run at scale=4 can easily take
    # 5+ minutes. Don't let nginx kill it.
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    server {
        listen 80;
        server_name _;

        # ----- static UI -----
        root /usr/share/nginx/html;
        index index.html;

        location = / { try_files /index.html =404; }

        # ----- NAS-hosted config + styles (hot-reloadable) -----
        # /usr/share/nginx/html/nas/ is the read-only mount of the NAS
        # `dream-config` hostPath. try_files prefers the NAS copy and
        # falls back to the bundled config.json that ships in the
        # ConfigMap so a fresh deploy (with no NAS file yet) still
        # boots cleanly. styles.json has no bundled fallback — the UI
        # treats a 404 here as "no saved styles yet" (built-in styles
        # from config.json still render).
        location = /config.json { try_files /nas/config.json /config.json =404; }
        location = /styles.json { try_files /nas/styles.json =404; }

        # ----- Save endpoint: PUT /save/{config,styles}.json -----
        # Proxied to the save-sidecar (same pod, localhost:8081), which
        # backs up the prior version into <dir>/backups/ before atomic
        # replace. GET is intentionally not exposed — reads go through
        # the /config.json + /styles.json locations above.
        location /save/ {
            limit_except PUT { deny all; }
            proxy_pass http://127.0.0.1:8081/save/;
            proxy_request_buffering off;
            client_max_body_size 2m;
        }

        # ----- Forge API proxy -----
        # /sdapi/v1/options POST is allowed. We tried blocking it for
        # safety (anyone reachable on nodePort 31310 could flip settings)
        # and using per-request override_settings on img2img instead, but
        # Forge Neo's preset system needs a real options POST to swap
        # actively-loaded models — override_settings.forge_preset only
        # updates the stored value, it does NOT trigger the reload that
        # actually changes which model is in VRAM. Without the real POST,
        # checkpoint switches silently fail (model stays loaded from a
        # prior session). The pod is on a private k3s network; the risk
        # of the open endpoint is acceptable for this internal tool.
        location /sdapi/      { proxy_pass http://127.0.0.1:7860; }
        location /controlnet/ { proxy_pass http://127.0.0.1:7860; }
        # /internal/sysinfo is what the Debug → Sysinfo button hits. Without
        # this proxy the button silently falls back to /sdapi/v1/sysinfo
        # (which doesn't exist) and reports "unavailable".
        location /internal/   { proxy_pass http://127.0.0.1:7860; }
        # Forge serves model thumbnails and assets at /file=... — proxy those too.
        location /file=       { proxy_pass http://127.0.0.1:7860; }

        # ----- LoRA directory listing (JSON via autoindex) -----
        # The LoRA hostPath is bind-mounted into /loras inside this nginx
        # container. We serve a JSON index that the frontend consumes to
        # populate its LoRA <select>.
        location /loras/ {
            alias /loras/;
            autoindex on;
            autoindex_format json;
            autoindex_exact_size off;
            add_header Cache-Control "no-cache";
        }

        # ----- Browse root: the program "home" for typeable batch paths -----
        # The deployment binds a host directory into this sidecar at /nas. The
        # UI's batch field accepts paths relative to that mount and fetches an
        # autoindex JSON listing, then pulls each image as a blob to send to
        # Forge as base64.
        location /nas/ {
            alias /nas/;
            autoindex on;
            autoindex_format json;
            autoindex_exact_size off;
            add_header Cache-Control "no-cache";
        }

        # ----- Health check -----
        location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
    }
}
